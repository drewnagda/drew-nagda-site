name: Publish Belalcazar site to gh-pages

on:
  push:
    branches:
      - claude/belalcazar-trainer-website-5abkom
    paths:
      - "belalcazar/**"
      - ".github/workflows/deploy-belalcazar-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push belalcazar/ to gh-pages
        run: |
          cd belalcazar
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Belalcazar site"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
